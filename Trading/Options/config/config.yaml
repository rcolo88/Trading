# Options Backtesting Configuration

# Target underlying asset
underlying:
  symbol: SPY
  name: "SPDR S&P 500 ETF Trust"

# Synthetic data generation spec (single source of truth for generate + optimize).
# generate_synthetic_data.py writes a CSV named from these values, and every
# consumer (optimizers, research scripts) loads that same derived filename.
# Change the dataset here once -- no script edits needed.
synthetic_data:
  symbol: SPY
  start_date: "2021-01-01"   # Extended for 5-year WF/OOS window (VIX complex available from 2011+)
  end_date: "2026-06-12"
  max_dte: 90

# Backtesting period (the window a backtest runs over; may be a SUBSET of the
# synthetic_data range above -- these are distinct from the generation range).
backtest:
  # DoltHub real chains (clean iv, true term structure). Massive/Polygon free-tier was dropped:
  # its EOD closes back-solve to iv ~1.35x VIX and invert the term structure on 34% of slices
  # (no-arbitrage violations) — a calendar's P&L IS the near-vs-far relationship, so it's unusable.
  # The loader's data-quality gate now HARD-FAILS such data. See CHANGELOG 2026-06-25.
  start_date: "2021-01-04"   # Synthetic VIX-complex data, 5-year WF/OOS window
  end_date:   "2026-06-12"
  initial_capital: 10000

# Optimization controls (read by ParameterOptimizer)
optimization:
  min_trades: 10   # Trials with fewer trades than this have their Sharpe/Sortino/Calmar NaN'd, so a
                   #   handful of lucky trades can't win the search and degenerate ~0-volatility
                   #   Sharpes (|SR|~1e16) don't pollute the deflated-Sharpe benchmark. Raise as you
                   #   add history (more days -> more trades -> a higher floor is reasonable).

# Data source configuration
data_source:
  # Which options dataset the loader (load_sample_spy_options_data) serves:
  #   synthetic -> Black-Scholes model data (calibrated skew + term structure, dense chains) —
  #                use for parameter exploration when real data is too sparse for stable ranking.
  #   real      -> DoltHub/logged chains with true skew + term structure — use for any real
  #                conclusion. Build with: python -m src.data_fetchers.real_chain_loader ...
  #   hybrid    -> REAL data wherever DoltHub sampled it, plus CALIBRATED SYNTHETIC fill for
  #                missing (date, expiration) pairs so every expiration is quotable every day.
  #                Best of both: real prices/historical skew where they exist, dense enough for
  #                entry/exit to fire reliably.  Recommended default.
  mode: "synthetic"  # synthetic | real | hybrid
                     # VIX-complex-driven synthetic: term structure from real ^VIX9D/^VIX/^VIX3M/^VIX6M
  primary: "quantconnect"  # Options: quantconnect, yahoo, polygon, schwab
  backup: "yahoo"  # For underlying price data
  cache_enabled: true
  cache_dir: "data/processed"

  # Reprice bid/ask from the (clean) IV surface on real data. On the DoltHub free dataset the iv
  # column tracks VIX (ATM ~30d iv/VIX ~= 0.95) but the raw bid/ask is inflated/noisy (mid implies
  # ~1.47x VIX), so marking held positions against bid/ask is inconsistent with entry and breaks
  # profit/stop/dte exits. Repricing every contract off its own clean iv (Black-Scholes, real skew +
  # term structure preserved) puts entry, exit, and daily re-marks on one fair basis. Set false to
  # backtest the raw quotes instead.
  # OptionsDX EOD bid/ask are genuine exchange quotes (clean), so backtest them DIRECTLY rather
  # than repricing off the IV column. Set true ONLY for the DoltHub dataset (whose raw bid/ask is
  # inflated ~1.47x VIX). Build the OptionsDX file with: python -m src.data_fetchers.optionsdx_loader
  price_from_iv: true   # DoltHub: clean iv, dirty bid/ask -> reprice off iv (true). The loader's
                        #   data-quality gate refuses any dataset that isn't arbitrage-coherent.
  # allow_low_quality: false  # set true ONLY to deliberately override the gate (NOT recommended)
  reprice:
    risk_free_rate: 0.04
    spread_frac: 0.008     # ~0.8% matches real SPY ATM liquidity (was 0.03 — 3-6x too wide)
    min_spread: 0.01       # 1¢ floor (was 0.05)

# Real options dataset spec (used when data_source.mode == real). The real_chain_loader writes
# data/processed/SPY_real_options_<start>_<end>.csv from these values, and the loader reads it.
real_data:
  symbol: SPY
  # Selects data/processed/SPY_real_options_<start>_<end>.csv. DoltHub chains: clean iv + true term
  # structure (ATM iv/VIX ~0.93, 0% term-structure inversions), ~3 expirations/day (sparse, handled
  # by synthetic_remark + strike_snap). The Massive 2024-06..2026-06 pull is corrupt — do NOT use it.
  start_date: "2021-01-01"
  end_date:   "2026-06-08"

# Transaction costs / fill model (see src/utils/execution.py)
costs:
  commission_per_contract: 0.65   # Per contract, per leg, per side
  # Fills cross a FRACTION of the way from mid to the natural price (0=mid, 1=full bid/ask spread).
  # Industry backtests (e.g. ORATS) assume ~0.56-0.75 of the spread; less for multi-leg.
  limit_fill_fraction: 0.5        # entries + planned/profit-target/DTE exits (working limit orders)
  market_fill_fraction: 1.0       # stop-loss exits ONLY — a market order (no stop-limit available)
  extra_slippage_percent: 0.0     # optional flat extra %/leg on top, for illiquid names (SPY: ~0)
  stop_slippage_percent: 0.10     # STOP exits ONLY: extra loss as a fraction of the entry debit, for
                                  #   monitoring-lag overshoot when no resting multi-leg stop exists
                                  #   (Robinhood). 0.10 turns an intended -10% stop into a ~-20% fill.
                                  #   SPY calendars: 0.05-0.10 is reasonable; set 0 to disable.

# Strategy parameters
strategies:
  bull_put_spread:          # Credit spread - neutral to bullish
    enabled: true
    entry:
      dte_min: 35           # Days to expiration
      dte_max: 45
      short_delta: 0.30     # Sell put with ~30 delta
      long_delta: 0.10      # Buy put with ~20 delta
      vix_min: 19           # Enter when VIX >= 19 (elevated IV - higher premium)
      vix_max: 35           # Don't enter if VIX > 35 (too volatile)
    exit:
      profit_target: 0.60   # Close at 50% of max profit
      stop_loss: 0.20       # Stop at 50% of max loss
      dte_min: 10           # Close if DTE drops below 21

  bull_call_spread:         # Debit spread - moderately bullish
    enabled: true
    entry:
      dte_min: 30
      dte_max: 60
      long_delta: 0.60      # Buy ~60 delta call (lower strike, richer)
      short_delta: 0.30     # Sell ~30 delta call (higher strike) — distinct strike, real debit
      vix_min: 13           # Can enter in low VIX (cheaper debit)
      vix_max: 17           # Don't enter if VIX > 17 (too expensive)
    exit:
      profit_target: 0.75   # Target 75% of max profit
      stop_loss: 0.20       # Stop at 50% of max loss
      dte_min: 14

  bear_put_spread:          # Debit spread - moderately bearish (mirror of bull_call)
    enabled: true
    entry:
      dte_min: 30
      dte_max: 60
      long_delta: 0.60      # Buy ~60 delta put (higher strike, richer)
      short_delta: 0.30     # Sell ~30 delta put (lower strike)
      vix_min: 13
      vix_max: 17
    exit:
      profit_target: 0.75
      stop_loss: 0.20
      dte_min: 14

  call_calendar:            # Time spread - neutral to slightly bullish
    enabled: true
    entry:
      # DTE Configuration - Two approaches supported:
      # Approach 1 (Default): Center ± Tolerance
      near_dte: 14           # Sell 30 DTE call (center point)
      far_dte: 42            # Buy 60 DTE call (center point)
      dte_tolerance: 5       # +/- 1 day tolerance (creates range: 14-16 and 49-51)

      # Approach 2 (For Optimizer): Min/Max Ranges
      # Uncomment to use explicit ranges instead of center ± tolerance:
      # near_dte_min: 25      # Minimum DTE for near-term leg
      # near_dte_max: 35      # Maximum DTE for near-term leg
      # far_dte_min: 55       # Minimum DTE for far-term leg
      # far_dte_max: 65       # Maximum DTE for far-term leg
      # Note: If min/max specified, they override near_dte/far_dte/dte_tolerance

      require_contango: false # Only enter when front-month IV < back-month IV (normal, upward-sloping
                             #   term structure). Refuses backwardation (vol-spike) entries, where a
                             #   long calendar structurally loses — externally-sourced data: contango
                             #   ~+18% avg vs backwardation ~-15%. Fixed gate (no optimizer dimension,
                             #   so it doesn't deflate the Deflated Sharpe).
                             # DEFAULT OFF: the Massive/Polygon free-tier dataset's option prices are
                             #   thin last-trade prints (1-6 contracts/day) that back-solve to IVs 2-4x
                             #   VIX, inflated WORSE at short DTE — which fabricates backwardation on
                             #   ~99% of days and makes this gate reject nearly every entry. Turn it ON
                             #   only on a dataset with trustworthy term structure (genuine exchange
                             #   bid/ask, e.g. OptionsDX), where near/far IV is real. See CHANGELOG.
      strike_selection: "delta"  # Options: atm, delta, moneyness
      target_delta: 0.4     # Used if strike_selection = "delta"
      moneyness: 0.0         # Used if strike_selection = "moneyness" (0.0 = ATM)
      min_debit: 0.5         # Minimum debit to enter (optional)
      max_debit: 10.0        # Maximum debit to enter (increased for SPY ~$530)
      vix_min: 5            # Calendars prefer low VIX environment
      vix_max: 25            # Don't enter if VIX > 20 (defeats calendar purpose)
      vix_rank_max: 30       # VIX IV-Rank gate: only enter when VIX's percentile over its trailing
                             #   252 days is <= this (a long calendar is long vega -> open when vol is
                             #   cheap vs its own year). Unlike vix_min/vix_max (same-day scalars the
                             #   engine passes the strategy), the rank needs a 252d window + warmup, so
                             #   the optimizer script builds it ONCE from ^VIX (cached) as an entry gate
                             #   rather than recomputing it every trial. Uses CLEAN VIX, so it is
                             #   unaffected by the Massive option-price issue that disabled contango.
                             #   Set to null to disable; CLI --vix-rank=N overrides, --no-vix-rank off.
    exit:
      profit_target: 0.3    # Close at 30% profit
      stop_loss: -0.1        # Stop at 10% loss
      dte_exit: 5            # Exit when near-term has 7 DTE left
      max_underlying_move: 0.10  # Exit if underlying moves >10% from strike
      strike_snap_pct: 0.01  # Re-mark a held leg at the nearest quoted strike within this % of spot
                             #   when its exact strike isn't quoted (real chains are sparse). 0.01
                             #   (~$7 on SPY) bridges the median gap with minimal distortion; 0 = off.
      # When a held leg's exact contract isn't quoted at all on a later day, synthesize its mark via
      # Black-Scholes off the day's IV surface (so profit/stop/dte exits can fire every day instead of
      # the trade drifting to near-expiration). Needs consistent pricing — keep data_source.price_from_iv
      # on. Set false to revert to hold-until-quoted behavior.
      synthetic_remark: true
      synthetic_iv_fallback: 0.18   # IV used only when a day has no usable quotes at all
      synthetic_spread_frac: 0.02   # modeled half-spread on synthesized marks

  iron_condor:              # Market-neutral credit spread (bull put + bear call)
    enabled: true
    entry:
      dte_min: 35           # ~45 DTE entry window (tastytrade standard)
      dte_max: 50
      put_short_delta: 0.20  # sell ~16-20 delta short strikes
      put_long_delta: 0.10   # buy further-OTM wings
      call_short_delta: 0.20
      call_long_delta: 0.10
      min_credit: 0.5        # minimum total credit to enter
      max_wing_width: 50.0   # generous: SPY delta-selected wings can be wide ($5 strike spacing)
      vix_min: 15            # ICs prefer elevated IV (premium-rich)
      vix_max: 40
    exit:
      profit_target: 0.50    # close at 50% of credit captured
      stop_loss: 0.75        # stop at 75% of max loss
      dte_min: 21            # close/roll at 21 DTE (gamma ramp)
      breach_threshold: 0.02 # exit if price reaches within 2% of a short strike

# Position sizing
position_sizing:
  method: "fixed_risk"  # Options: fixed_risk, kelly
  max_risk_percent: 10.0  # Maximum portfolio risk exposure (% of current portfolio value)

  # Kelly Criterion percentages (manually updated from Kelly_Criteria notebook)
  # Workflow:
  #   1. Run backtest → 2. Calculate Kelly in notebook → 3. Update values below
  # Important: Use Half Kelly (multiply by 0.5) or Quarter Kelly (multiply by 0.25)
  kelly_pct:
    bull_put_spread: 0.06    # Example: 6% (Half Kelly of 12%)
    bull_call_spread: 0.04   # Example: 4% (Half Kelly of 8%)
    call_calendar: 0.05      # Example: 5% (Half Kelly of 10%)
    iron_condor: 0.05        # Example: 5% (Half Kelly of 10%)

# Market filters (global fallback - each strategy has its own VIX criteria in entry section)
market_filters:
  vix_max: 23  # Global fallback: Don't enter if VIX > 23
  vix_min: 15  # Global fallback: Don't enter if VIX < 15

# Analysis and reporting
analysis:
  metrics:
    - "total_pnl"
    - "annualized_return"
    - "win_rate"
    - "profit_factor"
    - "max_drawdown"
    - "sharpe_ratio"
    - "calmar_ratio"
    - "average_win"
    - "average_loss"
    - "trade_count"

  visualization:
    plot_equity_curve: true
    plot_drawdown: true
    plot_monthly_returns: true
    plot_greeks_exposure: true

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/backtest.log"
  console: true
